name: CI (Lint + Test)
on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,api]"
      - run: ruff check .
      - run: ruff format --check .
      - name: Validate DAG syntax
        run: python -m py_compile dags/dag_collect_index.py dags/dag_evaluation.py dags/dag_qa_generation.py
      - run: pytest
