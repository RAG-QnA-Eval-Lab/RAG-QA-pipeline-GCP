name: Deploy FE (Streamlit)
on:
  push:
    branches: [main]
    paths:
      - "src/ui/**"
      - "Dockerfile.ui"
  workflow_dispatch:

env:
  PROJECT_ID: rag-qna-eval
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy UI service
        run: |
          gcloud run deploy rag-youth-policy-ui \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/ui:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --memory 512Mi
