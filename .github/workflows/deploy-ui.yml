name: Deploy FE (Streamlit)
on:
  push:
    branches: [main]
    paths:
      - "src/ui/**"
      - "Dockerfile.ui"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
      - name: Build and push UI image
        run: |
          docker build \
            -t asia-northeast3-docker.pkg.dev/rag-youth-policy/repo/ui:${{ github.sha }} \
            -f Dockerfile.ui .
          docker push asia-northeast3-docker.pkg.dev/rag-youth-policy/repo/ui:${{ github.sha }}
      - name: Deploy UI service
        run: |
          gcloud run deploy rag-youth-policy-ui \
            --image asia-northeast3-docker.pkg.dev/rag-youth-policy/repo/ui:${{ github.sha }} \
            --region asia-northeast3 \
            --memory 512Mi
