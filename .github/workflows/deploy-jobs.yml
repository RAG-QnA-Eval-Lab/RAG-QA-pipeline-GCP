name: Deploy Cloud Run Jobs
on:
  push:
    branches: [main]
    paths:
      - "src/ingestion/**"
      - "scripts/collect_policies.py"
      - "Dockerfile.collector"
      - "Dockerfile.indexer"
      - "config/**"
      - "pyproject.toml"
  workflow_dispatch:

env:
  PROJECT_ID: rag-qna-eval
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev

jobs:
  deploy-collector:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.collector
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/collector:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy Collector Job
        run: |
          gcloud run jobs deploy rag-collector \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/collector:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --memory 512Mi \
            --set-env-vars "DATA_PORTAL_API_KEY=${{ secrets.DATA_PORTAL_API_KEY }}" \
            --set-env-vars "GCS_BUCKET=rag-qna-eval-data" \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }}"

  deploy-indexer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Indexer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.indexer
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/indexer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy Indexer Job
        run: |
          gcloud run jobs deploy rag-indexer \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/indexer:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --memory 2Gi \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars "GCS_BUCKET=rag-qna-eval-data"
