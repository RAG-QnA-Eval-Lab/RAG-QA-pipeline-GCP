name: Deploy BE (FastAPI)
on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "src/retrieval/**"
      - "src/generation/**"
      - "src/evaluation/**"
      - "src/ingestion/**"
      - "config/**"
      - "Dockerfile"
      - "pyproject.toml"
  workflow_dispatch:

env:
  PROJECT_ID: rag-qna-eval
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Build and push API image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/api:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/api:${{ github.sha }}
      - name: Deploy API service
        run: |
          gcloud run deploy rag-youth-policy-api \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/repo/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --memory 2Gi \
            --set-env-vars "GCS_BUCKET=rag-qna-eval-data" \
            --set-env-vars "MONGODB_URI=${{ secrets.MONGODB_URI }}" \
            --set-env-vars "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
